name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate configuration files
        run: |
          test -f config/config.yaml
          test -f config/logging.yaml

      - name: Run Python linting with Ruff
        run: |
          ruff check src tests orchestration

      - name: Run unit tests
        run: |
          pytest tests/unit

      - name: Create test data for SQL validation
        run: |
          python tests/create_test_data.py

      - name: Run SQL data validation tests
        run: |
          python tests/run_sql_tests.py

  pipeline-smoke-test:
    name: Pipeline smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate configuration files
        run: |
          test -f config/config.yaml
          test -f config/logging.yaml

      - name: Run pipeline smoke test
        run: |
          python -m dagster job execute -f orchestration/definitions.py -j openf1_ingestion_job
