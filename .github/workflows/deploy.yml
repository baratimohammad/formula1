name: Deploy / Publish Pipeline Snapshot

on:
  push:
    branches:
      - main

jobs:
  publish-pipeline-snapshot:
    name: Run pipeline and publish artifacts
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      DAGSTER_HOME: ${{ github.workspace }}/.dagster

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Validate configuration files
        run: |
          test -f config/config.yaml
          test -f config/logging.yaml

      - name: Prepare Dagster home
        run: |
          mkdir -p "$DAGSTER_HOME"

      - name: Run pipeline
        run: |
          python -m dagster job execute -f orchestration/definitions.py -j openf1_ingestion_job

      - name: Upload raw data snapshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openf1-raw-data-${{ github.sha }}
          path: data/raw
          if-no-files-found: warn

      - name: Upload Dagster run metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dagster-run-metadata-${{ github.sha }}
          path: .dagster
          if-no-files-found: warn
